name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'nafsi-mobile/**'
      - '.github/workflows/build-mobile.yml'
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'nafsi-mobile/package-lock.json'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        working-directory: ./nafsi-mobile
        run: npm ci || npm install

      - name: Sync Capacitor
        working-directory: ./nafsi-mobile
        run: npx cap sync android

      - name: Build Android Release APK
        working-directory: ./nafsi-mobile/android
        run: chmod +x ./gradlew && ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nafsi-app-debug
          path: nafsi-mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
