name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'nafsi-mobile/**'
      - '.github/workflows/build-mobile.yml'
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies
        working-directory: ./nafsi-mobile
        run: npm install

      - name: Sync Capacitor
        working-directory: ./nafsi-mobile
        run: |
          mkdir -p dist
          echo "<html></html>" > dist/index.html
          npm i -D @capacitor/assets
          npx cap add android
          npx cap sync android
          npx @capacitor/assets generate --android
          ls -la android || echo "No android folder"

      - name: Build Android Release APK
        working-directory: ./nafsi-mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nafsi-app-debug
          path: nafsi-mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
