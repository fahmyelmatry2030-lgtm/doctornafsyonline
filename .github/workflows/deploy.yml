name: 🔨 Build for Linux + Push to GitHub

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client (Linux)
        run: npx prisma generate

      - name: Build Next.js (production)
        env:
          DATABASE_URL: "mysql://root:Password1@127.0.0.1:3306/nafsi_db"
          NEXTAUTH_SECRET: "hostinger-build-secret-placeholder"
          NEXTAUTH_URL: "https://doctornafsyonline.com"
          NODE_OPTIONS: "--max-old-space-size=3072"
        run: npm run build

      - name: Commit and push built .next folder
        run: |
          git config user.name "GitHub Actions Builder"
          git config user.email "builder@doctornafsyonline.com"

          # Force add the .next folder (it's gitignored normally)
          git add -f .next/

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[skip-ci] Linux production build $(date +'%Y-%m-%d %H:%M')"
            git push origin main
            echo "✅ Build artifacts pushed successfully!"
          fi
